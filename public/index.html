<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉRSHE · 二奢话术助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
        }
        /* === Header — 香奈儿风格黑标 === */
        header {
            background: #000;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            font-family: 'Times New Roman', serif;
            font-size: 20px; color: #C5A55A; font-weight: 700;
        }
        .brand-name {
            font-family: 'Times New Roman', serif;
            font-size: 13px; color: #fff;
            letter-spacing: 4px; text-transform: uppercase;
        }
        .brand-dot {
            width: 3px; height: 3px;
            background: #C5A55A; border-radius: 50%;
            display: inline-block; margin: 0 6px;
        }
        .brand-sub { font-size: 10px; color: #888; letter-spacing: 2px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-right span { font-size: 11px; color: #888; }
        .status-online {
            display: inline-block; width: 5px; height: 5px;
            background: #52c41a; border-radius: 50%; margin-right: 6px;
        }

        /* === Chat === */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 32px 32px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .msg {
            max-width: 72%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user {
            align-self: flex-end;
            background: #1a1a1a;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: #fff;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }
        .msg.bot .label {
            font-size: 10px; color: #C5A55A;
            margin-bottom: 8px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
        }
        .msg.bot .label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, #eee, transparent);
        }

        /* === Loading === */
        .loading {
            align-self: flex-start;
            display: none; gap: 5px; padding: 16px 20px;
            background: #fff; border: 1px solid #f0f0f0;
            border-radius: 12px; border-bottom-left-radius: 4px;
        }
        .loading.show { display: flex; }
        .loading span {
            width: 6px; height: 6px; background: #ccc;
            border-radius: 50%; animation: dotPulse 1.4s infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

        /* === Welcome === */
        .welcome {
            text-align: center; padding: 60px 20px 40px;
            max-width: 420px; margin: auto;
        }
        .welcome .logo {
            font-family: 'Times New Roman', serif;
            font-size: 44px; color: #C5A55A;
            margin-bottom: 16px; letter-spacing: 6px;
        }
        .welcome h2 {
            font-family: 'Times New Roman', serif;
            font-size: 24px; font-weight: 400;
            color: #1a1a1a; margin-bottom: 8px; letter-spacing: 2px;
        }
        .welcome .line {
            width: 32px; height: 1px;
            background: #C5A55A; margin: 14px auto;
        }
        .welcome p { font-size: 13px; color: #999; line-height: 1.8; }
        .welcome p em { color: #C5A55A; font-style: normal; }
        .welcome .examples {
            margin-top: 28px; list-style: none;
            display: flex; flex-direction: column; gap: 8px;
        }
        .welcome .examples li {
            font-size: 12px; color: #bbb; cursor: pointer;
            padding: 10px 16px; border-radius: 8px;
            border: 1px solid #eee; transition: all 0.3s;
            text-align: left;
        }
        .welcome .examples li:hover {
            border-color: #C5A55A; color: #1a1a1a;
            background: rgba(197,165,90,0.03);
        }

        /* === Input Area === */
        .input-area {
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 24px 16px;
            display: flex; gap: 10px;
            align-items: flex-end; flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px; color: #1a1a1a;
            resize: none; height: 44px; max-height: 120px;
            outline: none; font-family: inherit;
            transition: border-color 0.2s;
        }
        .input-area textarea:focus { border-color: #C5A55A; background: #fff; }
        .input-area textarea::placeholder { color: #ccc; }
        .input-area button {
            background: #1a1a1a;
            color: #fff; border: none; border-radius: 8px;
            padding: 10px 20px; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap; height: 44px; letter-spacing: 1px;
        }
        .input-area button:hover { background: #333; }
        .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

        .quick-reply {
            display: none; gap: 6px; padding: 4px 24px 10px;
            background: #fafafa; overflow-x: auto; flex-shrink: 0;
        }
        .quick-reply.show { display: flex; }
        .quick-reply button {
            flex-shrink: 0; background: #fff; border: 1px solid #eee;
            border-radius: 16px; padding: 4px 14px; font-size: 12px;
            color: #888; cursor: pointer; white-space: nowrap;
        }
        .quick-reply button:hover { border-color: #C5A55A; color: #C5A55A; }
        .quick-reply button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        @media (max-width: 600px) {
            header { padding: 0 16px; }
            #chat-box { padding: 20px 16px 8px; }
            .msg { max-width: 88%; }
            .input-area { padding: 8px 16px 12px; }
            .quick-reply { padding: 4px 16px 8px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <span class="brand-icon">É</span>
            <span class="brand-name">ERSHE</span>
            <span class="brand-dot"></span>
            <span class="brand-sub">二奢话术助手</span>
        </div>
        <div class="header-right">
            <span><span class="status-online"></span>在线</span>
        </div>
    </header>

    <div id="chat-box">
        <div class="welcome" id="welcome">
            <div class="logo">É</div>
            <h2>二奢话术助手</h2>
            <div class="line"></div>
            <p>
                劳力士专项 · 知识库与大模型双版本输出<br>
                为转转顾问提供 <em>专业话术支持</em>
            </p>
            <ul class="examples" id="example-list">
                <li onclick="useExample(this)">熊猫迪 95 新全套带保卡现在什么价</li>
                <li onclick="useExample(this)">绿水鬼 126610LV 客户说价格太低怎么办</li>
                <li onclick="useExample(this)">劳力士保卡怎么看年份，2020 年保卡有影响吗</li>
            </ul>
        </div>
    </div>

    <div class="quick-reply" id="quick-reply"></div>

    <div class="input-area">
        <textarea id="input" rows="1" placeholder="输入型号、成色、配件和客户对话..." onkeydown="onEnter(event)"></textarea>
        <button id="send-btn" onclick="send()">发送</button>
    </div>

    <script>
        function addMsg(html, cls) {
            const box = document.getElementById('chat-box');
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.innerHTML = html;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }
        function addBotMsg(text) {
            return addMsg(
                '<div class="label">✦ 二奢话术助手</div>' + text.replace(/\n/g, '<br>'),
                'bot'
            );
        }
        function addUserMsg(text) { return addMsg(text, 'user'); }
        function showLoading() {
            const d = document.createElement('div');
            d.className = 'loading show'; d.id = 'loading-indicator';
            d.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('chat-box').appendChild(d);
            d.scrollIntoView();
        }
        function hideLoading() { const el = document.getElementById('loading-indicator'); if (el) el.remove(); }
        function onEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        function useExample(el) {
            document.getElementById('input').value = el.textContent;
            send();
        }

        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            document.getElementById('send-btn').disabled = true;
            document.getElementById('quick-reply').className = 'quick-reply';

            addUserMsg(text);
            showLoading();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || '请求失败');
                }
                const data = await res.json();
                hideLoading();
                addBotMsg(data.content);

                const bar = document.getElementById('quick-reply');
                bar.innerHTML = ''; bar.className = 'quick-reply show';
                ['继续说下去', '换一种说法', '再详细一点'].forEach(s => {
                    const b = document.createElement('button');
                    b.textContent = s;
                    if (s === '继续说下去') b.className = 'primary';
                    b.onclick = () => {
                        document.getElementById('input').value = text + '\n' + s;
                        send();
                    };
                    bar.appendChild(b);
                });
                setTimeout(() => { bar.className = 'quick-reply'; }, 30000);
            } catch (err) {
                hideLoading();
                addBotMsg('⚠️ ' + err.message);
            } finally {
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
