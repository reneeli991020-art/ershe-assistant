<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉRSHE · 二奢话术助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'PingFang SC', -apple-system, sans-serif;
            font-weight: 300;
            background: #F8F8F8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
        }
        header {
            background: #000;
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(201,169,98,0.15);
            position: relative;
            z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-icon {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(135deg, #D4AF37 0%, #C9A962 40%, #B8942E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 5px;
            color: #fff;
        }
        .brand-dot {
            width: 3px; height: 3px;
            background: #C9A962;
            border-radius: 50%;
            display: inline-block; margin: 0 8px;
        }
        .brand-sub {
            font-family: 'Noto Serif SC', serif;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            letter-spacing: 3px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right span { font-size: 11px; color: #888; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .status-online {
            display: inline-block; width: 6px; height: 6px;
            background: #52c41a; border-radius: 50%; position: relative;
        }
        .status-online::after {
            content: ''; position: absolute; top: -3px; left: -3px;
            width: 12px; height: 12px;
            background: rgba(82,196,26,0.2); border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }

        #chat-box {
            flex: 1; overflow-y: auto; padding: 40px 48px 20px;
            display: flex; flex-direction: column; gap: 24px;
            background: #F8F8F8; max-width: 900px; margin: 0 auto; width: 100%;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .msg { max-width: 72%; padding: 16px 24px; border-radius: 8px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; animation: fadeIn 0.35s ease; font-weight: 400; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: #1a1a1a; color: #fff; border-bottom-right-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .msg.bot { align-self: flex-start; background: #fff; color: #1a1a1a; border-bottom-left-radius: 2px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #eee; max-width: 78%; }
        @media (max-width: 768px) { .msg.bot { max-width: 92%; } }
        .msg.bot .label {
            font-family: 'Inter', sans-serif; font-size: 10px; color: #C9A962;
            margin-bottom: 14px; font-weight: 500; letter-spacing: 1.5px;
            text-transform: uppercase; display: flex; align-items: center; gap: 10px;
        }
        .msg.bot .label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #ddd, transparent); }
        .version-card { margin-top: 12px; padding: 14px 16px; border-radius: 6px; font-size: 13px; line-height: 1.9; position: relative; }
        .version-card:first-child { margin-top: 0; }
        .version-card .v-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .version-card .v-label::before { content: ''; width: 3px; height: 12px; border-radius: 2px; }
        .version-card.kb { background: #F5F7FA; border-left: 3px solid #4A90D9; }
        .version-card.kb .v-label { color: #4A90D9; }
        .version-card.kb .v-label::before { background: #4A90D9; }
        .version-card.llm { background: #FFFBF0; border-left: 3px solid #D4AF37; }
        .version-card.llm .v-label { color: #B8942E; }
        .version-card.llm .v-label::before { background: #D4AF37; }
        .version-card .v-content { color: #333; font-weight: 400; }
        .version-card.disclaimer { background: transparent; border-left: none; padding: 8px 16px 0; margin-top: 4px; }
        .version-card.disclaimer .v-content { font-size: 11px; color: #bbb; line-height: 1.6; }

        .admin-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 11px; padding: 4px 6px; border-radius: 4px; transition: all 0.2s; letter-spacing: 1px; }
        .admin-btn:hover { color: #C9A962; background: rgba(201,169,98,0.08); }
        .log-panel { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #fff; box-shadow: -4px 0 30px rgba(0,0,0,0.1); z-index: 1000; flex-direction: column; animation: slideIn 0.25s ease; }
        .log-panel.show { display: flex; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .log-panel .log-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .log-panel .log-header h3 { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 400; color: #1a1a1a; }
        .log-panel .log-header button { background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 4px; }
        .log-panel .log-header button:hover { color: #999; }
        .log-panel .log-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
        .log-panel .log-body::-webkit-scrollbar { width: 3px; }
        .log-panel .log-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .log-entry { padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .log-entry:last-child { border-bottom: none; }
        .log-entry .log-time { font-size: 11px; color: #bbb; margin-bottom: 4px; }
        .log-entry .log-q { color: #1a1a1a; font-weight: 400; line-height: 1.5; }
        .log-entry .log-has-img { display: inline-block; font-size: 10px; color: #C9A962; margin-left: 6px; }
        .log-empty { text-align: center; padding: 60px 20px; color: #ccc; font-size: 13px; }
        .log-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15); z-index: 999; }
        .log-overlay.show { display: block; }

        .loading { align-self: flex-start; display: none; gap: 10px; padding: 16px 24px; background: #fff; border: 1px solid #eee; border-radius: 8px; border-bottom-left-radius: 2px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); flex-direction: column; }
        .loading.show { display: flex; }
        .loading .dots { display: flex; gap: 5px; align-items: center; }
        .loading span { width: 6px; height: 6px; background: #d0d0d0; border-radius: 50%; animation: dotPulse 1.4s infinite; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        .loading .elapsed { font-size: 11px; color: #bbb; font-weight: 300; }
        @keyframes dotPulse { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

        .welcome { text-align: center; padding: 80px 20px 60px; max-width: 460px; margin: auto; width: 100%; }
        .welcome .logo {
            font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700;
            font-style: italic; background: linear-gradient(135deg, #D4AF37 0%, #C9A962 40%, #B8942E 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 20px; letter-spacing: 8px;
        }
        .welcome h2 { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 400; color: #1a1a1a; margin-bottom: 6px; letter-spacing: 4px; }
        .welcome .gold-line { width: 40px; height: 1px; background: linear-gradient(90deg, #D4AF37, #C9A962); margin: 18px auto; }
        .welcome p { font-size: 13px; color: #999; line-height: 2; font-weight: 300; letter-spacing: 0.5px; }
        .welcome p em { color: #C9A962; font-style: normal; font-weight: 400; }

        .examples { margin-top: 36px; list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .examples li {
            font-size: 13px; color: #888; cursor: pointer; padding: 14px 20px;
            border-radius: 8px; border: 1px solid #e8e8e8; background: #fff;
            transition: all 0.3s ease; text-align: left; font-weight: 400;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02); position: relative; overflow: hidden;
        }
        .examples li::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 2px;
            background: linear-gradient(180deg, #D4AF37, #C9A962); opacity: 0; transition: opacity 0.3s ease;
        }
        .examples li:hover { border-color: #C9A962; color: #1a1a1a; box-shadow: 0 4px 16px rgba(201,169,98,0.1); transform: translateY(-1px); }
        .examples li:hover::before { opacity: 1; }

        .input-wrapper { background: #F8F8F8; padding: 0 48px 24px; flex-shrink: 0; }
        .input-area { max-width: 900px; margin: 0 auto; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 6px 6px 6px 20px; display: flex; gap: 8px; align-items: flex-end; box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: border-color 0.25s ease, box-shadow 0.25s ease; }
        .input-area:focus-within { border-color: #C9A962; box-shadow: 0 4px 24px rgba(201,169,98,0.12); }
        .input-area textarea { flex: 1; background: transparent; border: none; padding: 10px 0; font-size: 14px; color: #1a1a1a; resize: none; height: 44px; max-height: 120px; outline: none; font-family: inherit; font-weight: 400; }
        .input-area textarea::placeholder { color: #ccc; font-weight: 300; }
        .input-area button { background: #000; color: #fff; border: none; border-radius: 6px; padding: 0 24px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; height: 40px; letter-spacing: 1px; }
        .input-area button:hover { background: #222; }
        .input-area button:disabled { opacity: 0.2; cursor: not-allowed; }
        .upload-btn { background: none; border: none; cursor: pointer; padding: 8px 4px 8px 8px; font-size: 18px; color: #bbb; transition: color 0.2s; display: flex; align-items: center; height: 40px; flex-shrink: 0; }
        .upload-btn:hover { color: #C9A962; }
        .preview-area { max-width: 900px; margin: 0 auto 8px; display: none; padding: 0 4px; margin-top: 10px; }
        .preview-area.show { display: block; }
        .preview-area .preview-inner { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 6px 10px 6px 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .preview-area img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; }
        .preview-area .preview-name { font-size: 12px; color: #888; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 400; }
        .preview-area .preview-close { background: none; border: none; cursor: pointer; font-size: 14px; color: #ccc; padding: 2px; line-height: 1; }
        .preview-area .preview-close:hover { color: #999; }

        .quick-reply { display: none; gap: 8px; padding: 0 48px 20px; flex-shrink: 0; max-width: 900px; margin: 0 auto; width: 100%; }
        .quick-reply.show { display: flex; }
        .quick-reply button { flex-shrink: 0; background: #fff; border: 1px solid #e8e8e8; border-radius: 20px; padding: 6px 18px; font-size: 12px; color: #888; cursor: pointer; white-space: nowrap; font-weight: 400; transition: all 0.25s ease; }
        .quick-reply button:hover { border-color: #C9A962; color: #C9A962; background: rgba(201,169,98,0.04); }
        .quick-reply button.primary { background: #000; color: #fff; border-color: #000; }
        .quick-reply button.primary:hover { background: #222; border-color: #222; color: #fff; }

        @media (max-width: 768px) {
            header { padding: 0 20px; }
            #chat-box { padding: 28px 20px 16px; }
            .msg { max-width: 88%; font-size: 13px; }
            .input-wrapper { padding: 0 20px 16px; }
            .quick-reply { padding: 0 20px 14px; }
            .welcome { padding: 60px 16px 40px; }
        }
        @media (max-width: 480px) {
            .brand-name { font-size: 12px; letter-spacing: 3px; }
            .brand-sub { display: none; }
            header { padding: 0 16px; height: 56px; }
            #chat-box { padding: 20px 12px 12px; gap: 16px; }
            .msg { max-width: 92%; padding: 14px 18px; }
            .input-area { padding: 4px 4px 4px 14px; }
            .input-area textarea { font-size: 13px; }
            .input-area button { padding: 0 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <span class="brand-icon">É</span>
            <span class="brand-name">ERSHE</span>
            <span class="brand-dot"></span>
            <span class="brand-sub">二奢话术助手</span>
        </div>
        <div class="header-right">
            <span><span class="status-online"></span>已连接</span>
            <button class="admin-btn" onclick="toggleLog()" title="查询记录">◈</button>
        </div>
    </header>

    <div id="chat-box">
        <div class="welcome" id="welcome">
            <div class="logo">É</div>
            <h2>二奢话术助手</h2>
            <div class="gold-line"></div>
            <p>劳力士专项 · 知识库与大模型双版本输出<br>为转转顾问提供 <em>专业话术支持</em></p>
            <ul class="examples" id="example-list">
                <li onclick="useExample(this)">熊猫迪 95 新全套带保卡现在什么价</li>
                <li onclick="useExample(this)">绿水鬼 126610LV 客户说价格太低怎么办</li>
                <li onclick="useExample(this)">劳力士保卡怎么看年份，2020 年保卡有影响吗</li>
            </ul>
        </div>
    </div>

    <div class="quick-reply" id="quick-reply"></div>

    <div class="input-wrapper">
        <div class="preview-area" id="preview-area">
            <div class="preview-inner">
                <img id="preview-img" src="" alt="">
                <span class="preview-name" id="preview-name"></span>
                <button class="preview-close" onclick="clearImage()">✕</button>
            </div>
        </div>
        <div class="input-area">
            <textarea id="input" rows="1" placeholder="输入型号、成色、配件和客户对话…" onkeydown="onEnter(event)"></textarea>
            <input type="file" id="file-input" accept="image/*" onchange="onImageSelect(event)" style="display:none">
            <button class="upload-btn" onclick="document.getElementById('file-input').click()" title="上传图片">◇</button>
            <button id="send-btn" onclick="send()">发送</button>
        </div>
    </div>

    <div class="log-overlay" id="log-overlay" onclick="toggleLog()"></div>
    <div class="log-panel" id="log-panel">
        <div class="log-header">
            <h3>查询记录</h3>
            <button onclick="toggleLog()">✕</button>
        </div>
        <div class="log-body" id="log-body"></div>
    </div>

    <script>
        let selectedFile = null;

        function addMsg(html, cls) {
            const box = document.getElementById('chat-box');
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.innerHTML = html;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }
        function addBotMsg(text, isError) {
            const div = addMsg('<div class="label">✦ ' + (isError ? '' : '二奢话术助手</div><div class="bot-content"></div>'), 'bot');
            if (isError) {
                const span = document.createElement('span');
                span.style.cssText = 'color:#e74c3c;font-weight:400;';
                span.textContent = text;
                div.appendChild(span);
                div.parentElement.scrollTop = div.parentElement.scrollHeight;
                return div;
            }
            const container = div.querySelector('.bot-content');
            const parts = parseVersions(text);
            container.innerHTML = parts.map(p =>
                '<div class="version-card ' + p.cls + '">' +
                (p.label ? '<div class="v-label">' + p.label + '</div>' : '') +
                '<div class="v-content">' + p.content.replace(/\n/g, '<br>') + '</div>' +
                '</div>'
            ).join('');
            return div;
        }
        function parseVersions(text) {
            const parts = [];
            // Normalize: strip markdown headers + "版本X：" prefixes
            let norm = text.replace(/^###\s*/gm, '').replace(/版本[一二1]\s*[：:]\s*/g, '').replace(/版本[二2]\s*[：:]\s*/g, '');
            const kbMatch = norm.match(/知识库版[话术]?\s*([\s\S]*?)(?=大模型版[话术]?|$)/);
            const llmMatch = norm.match(/大模型版[话术]?\s*([\s\S]*?)(?=知识库版[话术]?|$)/);
            let kbContent = kbMatch && kbMatch[1] ? kbMatch[1].trim() : '';
            let llmContent = llmMatch && llmMatch[1] ? llmMatch[1].trim() : '';
            const disclaimer = norm.match(/(市场信息仅供参考[\s\S]*)$/);
            const disclaimText = disclaimer ? disclaimer[1].trim() : '';
            if (kbContent) kbContent = kbContent.replace(disclaimText, '').trim();
            if (llmContent) llmContent = llmContent.replace(disclaimText, '').trim();
            if (kbContent) parts.push({ cls: 'kb', label: '知识库版话术', content: kbContent });
            if (llmContent) parts.push({ cls: 'llm', label: '大模型版话术', content: llmContent });
            if (parts.length === 0) {
                parts.push({ cls: 'kb', label: '话术参考', content: text.replace(/^###\s*/gm, '').trim() });
            }
            if (disclaimText) {
                parts.push({ cls: 'disclaimer', label: '', content: disclaimText });
            }
            return parts;
        }
        function addUserMsg(text) { return addMsg(text, 'user'); }
        let loadingTimer = null;
        function showLoading() {
            const d = document.createElement('div');
            d.className = 'loading show'; d.id = 'loading-indicator';
            d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><div class="elapsed" id="elapsed">0s</div>';
            document.getElementById('chat-box').appendChild(d);
            d.scrollIntoView();
            const start = Date.now();
            clearInterval(loadingTimer);
            loadingTimer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - start) / 1000);
                const el = document.getElementById('elapsed');
                if (el) el.textContent = elapsed + 's';
            }, 1000);
        }
        function hideLoading() {
            clearInterval(loadingTimer);
            loadingTimer = null;
            const el = document.getElementById('loading-indicator'); if (el) el.remove();
        }
        function onEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        function toggleLog() {
            const panel = document.getElementById('log-panel');
            const overlay = document.getElementById('log-overlay');
            const isOpen = panel.classList.toggle('show');
            overlay.classList.toggle('show', isOpen);
            if (isOpen) loadLogs();
        }
        async function loadLogs() {
            const body = document.getElementById('log-body');
            body.innerHTML = '<div class="log-empty">加载中...</div>';
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                if (!logs.length) { body.innerHTML = '<div class="log-empty">暂无记录</div>'; return; }
                body.innerHTML = logs.reverse().map(log =>
                    '<div class="log-entry">' +
                    '<div class="log-time">' + log.timestamp.replace('T', ' ').replace(/\.\d+Z/, '') + (log.hasImage ? '<span class="log-has-img">📷</span>' : '') + '</div>' +
                    '<div class="log-q">' + escapeHtml(log.query) + '</div>' +
                    '</div>'
                ).join('');
            } catch (e) {
                body.innerHTML = '<div class="log-empty">加载失败</div>';
            }
        }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function onImageSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                selectedFile = { data: ev.target.result.split(',')[1], name: file.name, mime: file.type || 'image/jpeg' };
                document.getElementById('preview-img').src = ev.target.result;
                document.getElementById('preview-img').src = ev.target.result;
                document.getElementById('preview-name').textContent = file.name;
                document.getElementById('preview-area').className = 'preview-area show';
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }
        function clearImage() {
            selectedFile = null;
            document.getElementById('preview-area').className = 'preview-area';
        }

        function useExample(el) {
            document.getElementById('input').value = el.textContent;
            send();
        }

        async function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text && !selectedFile) return;

            document.getElementById('send-btn').disabled = true;
            document.getElementById('quick-reply').className = 'quick-reply';

            addUserMsg(text || (selectedFile ? '[图片]' : ''));
            showLoading();

            try {
                let file_ids = [];
                if (selectedFile) {
                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file: selectedFile.data, filename: selectedFile.name, mime: selectedFile.mime })
                    });
                    if (!uploadRes.ok) {
                        let upErr = '图片上传失败';
                        try { const upData = await uploadRes.json(); upErr = upData.error || upErr; } catch (e) { upErr = await uploadRes.text().catch(() => upErr); }
                        throw new Error(upErr);
                    }
                    const uploadData = await uploadRes.json();
                    file_ids = [uploadData.file_id];
                    clearImage();
                }

                const origText = text;
                input.value = '';

                const chatRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text, file_ids: file_ids.length > 0 ? file_ids : undefined })
                });
                if (!chatRes.ok) {
                    let errMsg = '请求失败 (' + chatRes.status + ')';
                    try { const err = await chatRes.json(); errMsg = err.error || errMsg; } catch (e) { errMsg = await chatRes.text().catch(() => errMsg); }
                    throw new Error(errMsg);
                }
                const data = await chatRes.json();
                hideLoading();
                addBotMsg(data.content);

                const bar = document.getElementById('quick-reply');
                bar.innerHTML = ''; bar.className = 'quick-reply show';
                ['继续说下去', '换一种说法', '再详细一点'].forEach(s => {
                    const b = document.createElement('button');
                    b.textContent = s;
                    if (s === '继续说下去') b.className = 'primary';
                    b.onclick = () => {
                        document.getElementById('input').value = (origText || '') + '\n' + s;
                        send();
                    };
                    bar.appendChild(b);
                });
                setTimeout(() => { bar.className = 'quick-reply'; }, 30000);
            } catch (err) {
                hideLoading();
                addBotMsg('⚠️ ' + err.message, true);
            } finally {
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
