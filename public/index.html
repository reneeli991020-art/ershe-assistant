<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉRSHE · 二奢话术助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #f5f5f0;
            overflow: hidden;
        }
        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 16px 28px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(197,165,90,0.3), transparent);
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #C5A55A, #a8893a);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #0a0a0a;
        }
        .brand-name { font-size: 17px; font-weight: 700; color: #f5f5f0; letter-spacing: 2px; }
        .brand-sub { font-size: 10px; color: #666; letter-spacing: 2px; margin-left: 6px; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #52c41a; }
        #chat-box {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        /* 欢迎界面 - 首次加载显示，进入对话后隐藏 */
        .welcome {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            z-index: 1;
            transition: opacity 0.5s;
        }
        .welcome.hidden { opacity: 0; pointer-events: none; }
        .welcome .logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #C5A55A, #a8893a);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(197,165,90,0.15);
        }
        .welcome h2 {
            font-size: 24px; color: #f5f5f0;
            margin-bottom: 12px; letter-spacing: 1px;
        }
        .welcome .tagline {
            font-size: 14px; color: #888;
            line-height: 1.9; margin-bottom: 6px;
        }
        .welcome .tagline em { color: #C5A55A; font-style: normal; }
        .welcome .hint {
            margin-top: 32px;
            font-size: 13px; color: #555;
            animation: pulse-hint 2s infinite;
        }
        @keyframes pulse-hint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        /* COZE Chat SDK 容器 */
        #coze-chat-container {
            width: 100%;
            height: 100%;
        }
        /* 适配移动端 */
        @media (max-width: 600px) {
            header { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-icon">E</div>
            <span class="brand-name">ÉRSHE</span>
            <span class="brand-sub">二奢话术助手</span>
        </div>
        <div class="header-right">
            <span class="status-dot"></span>
            <span style="font-size:12px;color:#888;">在线</span>
        </div>
    </header>

    <div id="chat-box">
        <div class="welcome" id="welcome">
            <div class="logo">✦</div>
            <h2>二奢话术助手</h2>
            <p class="tagline">
                输入劳力士的型号、成色与客户对话<br>
                自动生成 <em>知识库版</em> 与 <em>大模型版</em> 双套话术
            </p>
            <div class="hint">点击下方对话框开始咨询 ↓</div>
        </div>
        <div id="coze-chat-container"></div>
    </div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <script>
        // 欢迎界面隐藏
        function hideWelcome() {
            document.getElementById('welcome').classList.add('hidden');
        }

        // 初始化 COZE Web Chat
        new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7628206290594005001',
            },
            componentProps: {
                title: '二奢话术助手',
                description: '劳力士专项 · 转转二奢回收',
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23C5A55A"/><text x="50" y="68" font-size="50" text-anchor="middle" fill="%230a0a0a" font-weight="bold">E</text></svg>'
            },
            auth: {
                type: 'token',
                token: 'cztei_hvrgQNFpyaPa7HyT6VPgCMsQiVlEVugjQxYTc4iAERJpwCde121JP1AuY9eo8uTkf',
                onRefreshToken: function () {
                    return 'cztei_hvrgQNFpyaPa7HyT6VPgCMsQiVlEVugjQxYTc4iAERJpwCde121JP1AuY9eo8uTkf';
                }
            },
            events: {
                onChatLoaded: function() {
                    hideWelcome();
                },
                onMessage: function() {
                    hideWelcome();
                }
            }
        });
    </script>
</body>
</html>
