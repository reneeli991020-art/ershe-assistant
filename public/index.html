<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉRSHE · 二奢话术助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'PingFang SC', -apple-system, sans-serif;
            font-weight: 300;
            background: #F8F8F8;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
        }

        /* === Header === */
        header {
            background: #000;
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(201,169,98,0.15);
            position: relative;
            z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-icon {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(135deg, #D4AF37 0%, #C9A962 40%, #B8942E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-name {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 5px;
            color: #fff;
        }
        .brand-dot {
            width: 3px; height: 3px;
            background: #C9A962;
            border-radius: 50%;
            display: inline-block;
            margin: 0 8px;
        }
        .brand-sub {
            font-family: 'Noto Serif SC', serif;
            font-size: 11px;
            font-weight: 400;
            color: #999;
            letter-spacing: 3px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-right span {
            font-size: 11px;
            color: #888;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-online {
            display: inline-block;
            width: 6px; height: 6px;
            background: #52c41a;
            border-radius: 50%;
            position: relative;
        }
        .status-online::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px;
            width: 12px; height: 12px;
            background: rgba(82,196,26,0.2);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* === SDK Chat 容器 === */
        @media (max-width: 768px) {
            header { padding: 0 20px; }
        }
        @media (max-width: 480px) {
            .brand-name { font-size: 12px; letter-spacing: 3px; }
            .brand-sub { display: none; }
            header { padding: 0 16px; height: 56px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <span class="brand-icon">É</span>
            <span class="brand-name">ERSHE</span>
            <span class="brand-dot"></span>
            <span class="brand-sub">二奢话术助手</span>
        </div>
        <div class="header-right">
            <span><span class="status-online"></span>已连接</span>
        </div>
    </header>

    <div id="chat-container" style="flex:1;min-height:0;"></div>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
        const chatContainer = document.getElementById('chat-container');
        new CozeWebSDK.WebChatClient({
            config: {
                type: 'bot',
                bot_id: '7628206290594005001',
                isIframe: true,
            },
            auth: {
                type: 'token',
                token: 'cztei_qm6RzjJbbnKwrgie1gylTZm7g7JYRhKQJyQpvwwNFiZOW1La4fsMgGQZPtWKTKA2b',
                onRefreshToken: async function () {
                    return 'cztei_qm6RzjJbbnKwrgie1gylTZm7g7JYRhKQJyQpvwwNFiZOW1La4fsMgGQZPtWKTKA2b';
                },
            },
            userInfo: {
                id: 'user',
                nickname: 'User',
            },
            ui: {
                base: {
                    layout: 'pc',
                    lang: 'zh-CN',
                    zIndex: 1000,
                },
                header: {
                    isShow: false,
                    isNeedClose: false,
                },
                asstBtn: {
                    isNeed: true,
                },
                footer: {
                    isShow: false,
                },
                chatBot: {
                    title: '二奢话术助手',
                    uploadable: true,
                    width: 460,
                },
            },
        });
        });
    </script>
</body>
</html>
